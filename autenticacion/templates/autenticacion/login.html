{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agenda</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#6C63FF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Agenda Paola">

    <!-- Ícono para Apple (iOS no usa manifest) -->
    <link rel="apple-touch-icon" href="{% static 'images/icono-192.png' %}">

    <!-- Manifest PWA -->
    <link rel="manifest" href="{% static 'manifest.json' %}">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'autenticacion/login.css' %}">

    <!-- Registro del Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register("{% static 'sw.js' %}")
                    .catch(err => console.error('Error al registrar el Service Worker:', err));
            });
        }
    </script>
</head>

<body>

    <!-- === PANTALLA DE LOGIN === -->
    <div id="login-screen" class="login-container">
        <!-- CAJA DEL LOGIN -->
        <div class="login-box">
            <!-- LOGO DE LA APLICACION -->
            <div class="login-logo">
                <span class="logo-libreta">🖹</span>
                <h1>AGENDA MÉDICA</h1>
            </div>

            <!-- FORMULARIO DEL LOGIN-->
            <form method="post">
                {% csrf_token %}
                <div class="login-form">
                    <input type="text" id="input-user" name="username" placeholder="Usuario" required>
                    <input type="password" id="input-pass" name="password" placeholder="contraseña" required>

                    <!-- OPCIONES DEL LOGIN -->
                    <div class="login-options">
                        <label class="remember-me">
                            <input type="checkbox"><span>Recordar</span>
                        </label>
                        <a href="{% url 'registro' %}" class="register-link">Registrarse</a>
                    </div>

                    <!-- BOTON DE LOGIN -->
                    <button type="submit" class="btn-login">Ingresar</button>

                    <!-- MENSAJES DE ALERTA -->
                    {% if messages %}
                    <div class="messages-container" style="margin-top: 15px; width: 100%;">
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}" style="position: relative; padding: 12px 35px 12px 15px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; font-family: sans-serif; text-align: left; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between;
                            {% if message.tags == 'success' %}
                                background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;
                            {% elif message.tags == 'error' or message.tags == 'danger' %}
                                background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;
                            {% else %}
                                background-color: #e2e3e5; color: #383d41; border: 1px solid #d6d8db;
                            {% endif %}">
                            <span>{{ message }}</span>
                            <button type="button" onclick="this.parentElement.style.display='none';" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 1.2rem; line-height: 1; color: inherit; cursor: pointer; opacity: 0.6; padding: 0 5px;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.6'">×</button>
                        </div>
                        {% endfor %}
                    </div>
                    {% endif %}
                </div>
            </form>
        </div>
    </div>


</body>

</html>
